<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="loader" id="loader">
    <span></span><span></span><span></span>
</div>

<div class="center-box">
    <div class="card p-5 text-center fade-in">
        <h2>✨ Create Account</h2>

        <input type="text" id="name" class="form-control my-2" placeholder="Name">
        <input type="email" id="email" class="form-control my-2" placeholder="Email">
        <input type="password" id="password" class="form-control my-2" placeholder="Password">

        <button onclick="register()" class="btn btn-warning w-100 mt-2">Register</button>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
