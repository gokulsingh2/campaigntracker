<!DOCTYPE html>
<html>
<head>
<title>Menu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="loader" id="loader">
    <span></span><span></span><span></span>
</div>

<div class="container mt-5">
    <h2 class="text-center mb-4">🍔 Food Menu</h2>

    <div class="row">

        <div class="col-md-4 fade-in">
            <div class="card p-4 text-center">
                <h4>Burger</h4>
                <p>₹100</p>
                <button onclick="addToCart('Burger',100)" class="btn btn-warning">Add</button>
            </div>
        </div>

        <div class="col-md-4 fade-in">
            <div class="card p-4 text-center">
                <h4>Pizza</h4>
                <p>₹250</p>
                <button onclick="addToCart('Pizza',250)" class="btn btn-warning">Add</button>
            </div>
        </div>

        <div class="col-md-4 fade-in">
            <div class="card p-4 text-center">
                <h4>Pasta</h4>
                <p>₹180</p>
                <button onclick="addToCart('Pasta',180)" class="btn btn-warning">Add</button>
            </div>
        </div>

    </div>

    <div class="text-center">
        <a href="cart.html" class="btn btn-light mt-4">Go to Cart</a>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
