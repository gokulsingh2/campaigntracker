<!DOCTYPE html>
<html>
<head>
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="/campaigntracker/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container" style="text-align: center;">
    <div class="brand-icon" style="width:44px;height:44px;font-size:14px;margin: 0 auto 24px;">CT</div>
    <div style="font-size: 80px; font-weight: 800; background: linear-gradient(135deg, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;">404</div>
    <h2 style="margin-top: 16px;">Page Not Found</h2>
    <p style="color: var(--text-secondary); font-size: 14px; margin-top: -16px; margin-bottom: 28px;">Oops! The page you're looking for doesn't exist.</p>
    <button onclick="window.location='/campaigntracker/login.html'" style="width: auto; padding: 12px 28px;">Go to Login</button>
    <p onclick="history.back()" style="margin-top: 16px; cursor: pointer; color: var(--primary-light);">← Go Back</p>
  </div>
</body>
</html>
